<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Photo Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
}

/* Background Video */

#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* Dark Overlay */

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.55);
    z-index:-1;
}
section{
    padding:80px 10%;
}

.title{
    text-align:center;
    margin-bottom:50px;
}

.title h2{
    font-size:45px;
    color:#38bdf8;
}

.title p{
    color:#cbd5e1;
    margin-top:10px;
}

/* Gallery */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    height:320px;
    object-fit:cover;
    border-radius:20px;
    cursor:pointer;
    border:3px solid rgba(255,255,255,.1);
    box-shadow:0 10px 30px rgba(0,0,0,.4);

    /* Animation */
    opacity:0;
    transform:translateY(80px);
    transition:all 3s ease;
}

.gallery img.show{
    opacity:1;
    transform:translateY(0);
}
.gallery img:hover{
    transform:scale(1.15) rotate(2deg);
    box-shadow:0 15px 40px rgba(56,189,248,.6);
}

/* Popup */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.95);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    opacity:0;
    visibility:hidden;
    transition:.5s;
}

.popup.show{
    opacity:1;
    visibility:visible;
}

.popup img{
    max-width:90%;
    max-height:90%;
    border-radius:20px;
    border:5px solid #38bdf8;
    transform:scale(.5);
    transition:.5s;
    box-shadow:0 0 40px #38bdf8;
}

.popup.show img{
    transform:scale(1);
}

.popup span{
    position:absolute;
    top:20px;
    right:35px;
    font-size:45px;
    color:#fff;
    cursor:pointer;
}
.back-btn{
    position:fixed;
    top:20px;
    left:20px;

    padding:12px 25px;
    font-size:18px;
    font-weight:600;
    color:#fff;

    background:linear-gradient(45deg,#00c6ff,#0072ff);
    border:none;
    border-radius:50px;

    cursor:pointer;
    transition:.4s;

    box-shadow:0 10px 25px rgba(0,114,255,.5);
    z-index:999;
}

.back-btn:hover{
    transform:translateY(-5px) scale(1.08);
    box-shadow:0 15px 35px rgba(0,198,255,.8);
}

.back-btn:active{
    transform:scale(.95);
}

</style>

</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="video/bg3-video.mp4" type="video/mp4">
</video>

<section>

<div class="title">
<h2>📸 My Gallery</h2>
<p>My Beautiful Memories</p>
</div>

<div class="gallery">

<img src="Photo/Certi1.jpeg" onclick="openImg(this.src)">
<img src="photo/maharaj.jpeg" onclick="openImg(this.src)">
<img src="photo/certi3.jpeg" onclick="openImg(this.src)">
<img src="photo/Lab.jpeg" onclick="openImg(this.src)">
<img src="photo/maharaj2.jpeg" onclick="openImg(this.src)">
<img src="Photo/certi2.jpeg" onclick="openImg(this.src)">
<img src="Photo/s3.jpeg" onclick="openImg(this.src)">
<img src="Photo/c5.png" onclick="openImg(this.src)">
<img src="Photo/figma.png" onclick="openImg(this.src)">
<img src="Photo/sc1.png" onclick="openImg(this.src)">
<img src="Photo/My Pic.jpeg" onclick="openImg(this.src)">
<img src="Photo/s3.jpeg" onclick="openImg(this.src)">




</div>

</section>

<div class="popup" id="popup">

<span onclick="closeImg()">&times;</span>

<img id="popupImg">

</div>

<script>

function openImg(pic){

    document.getElementById("popupImg").src = pic;

    document.getElementById("popup").classList.add("show");

}

function closeImg(){

    document.getElementById("popup").classList.remove("show");

}

</script>
<script>
const images = document.querySelectorAll('.gallery img');

const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }
    });
},{
    threshold:0.2
});

images.forEach((img) => {
    observer.observe(img);
});
</script>
</body>
</html>
