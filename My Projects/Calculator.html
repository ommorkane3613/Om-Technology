<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:Segoe UI, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
    }

    .calc{
        width:320px;
        padding:20px;
        border-radius:20px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        text-align:center;
    }

    /* ✅ FIX: Perfect centered display */
    #display{
        width: 100%;
        height: 70px;
        font-size: 32px;
        border: none;
        outline: none;
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 15px;

        text-align: right;          /* numbers stay on right like calculator */
        box-sizing: border-box;     /* FIX overflow issue */
        background: #fff;
    }

    .buttons{
        display:grid;
        grid-template-columns: repeat(4, 1fr);
        gap:10px;
    }

    button{
        height:60px;
        font-size:20px;
        border:none;
        border-radius:12px;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.05);
    }

    .num{ background:#f2f2f2; }
    .op{ background:#ff7b00; color:white; }
    .clear{ background:#e74c3c; color:white; }
    .equal{ background:#2ecc71; color:white; grid-column: span 4; }
</style>
</head>

<body>

<div class="calc">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('/')">÷</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="append('*')">×</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="op" onclick="append('-')">−</button>

        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="op" onclick="append('+')">+</button>

        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
function append(value){
    document.getElementById("display").value += value;
}

function calculate(){
    try{
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    }catch{
        document.getElementById("display").value = "Error";
    }
}

function clearDisplay(){
    document.getElementById("display").value = "";
}
</script>

</body>
</html>
